<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <head>
        <meta charset="UTF-8">
        <title>table</title>
        <style>
            table {
                padding: 1px;
                border: 1px solid black;
                background: yellow;
            }
            td {
                padding: 5px;
                border: 1px solid black;
            }
            .blue {
                background: cornflowerblue;
            }
        </style>
    </head>
<body>
<table>
    <thead>
    <tr class="blue">
        <td colspan="3">MY FIRST TABLE</td>
    </tr>
    </thead>
    <tbody>
    <tr>
        <td class="blue">First cell</td>
        <td class="blue">Second cell</td>
        <td rowspan="3">6 cells merged together</td>
    </tr>
    <tr>
        <td colspan="2">2 cells merged into one</td>
    </tr>
    <tr>
        <td>
            <span>1 st cell</span>
            <br>
            <span>3rd row</span>
        </td>
        <td>
            <span>2nd cell</span>
            <br>
            <span>3rd row</span>
        </td>
    </tr>
    </tbody>
    <tfoot>
    <tr>
        <td colspan="3">Do you like tables?</td>
    </tr>
    </tfoot>
</table>
</body>
</html>>
