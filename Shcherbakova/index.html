<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Table</title>
    <style>
        body {
            margin: 40px;
        }
        table {
            width: 650px;
            border: 2px double black;
            border-spacing: 0;
            text-align: center;
            font-family: Georgia, serif;
            font-size: 20px;

        }
        th, td {
            border: 2px double black;
            padding: 10px 20px;
        }
        th, #firstCell, #secondCell{
            background: cornflowerblue;
        }
        td{
            background: yellow;
        }
    </style>
</head>
<body>
<table>
    <thead>
    <tr>
        <th colspan="4">MY FIRST TABLE</th>
    </tr>
    </thead>
    <tbody>
    <tr>
        <td id="firstCell">First cell</td>
        <td id="secondCell">Second cell</td>
        <td colspan="2" rowspan="3">6 cells merged together</td>
    </tr>
    <tr>
        <td colspan="2">2 cells merged into one</td>
    </tr>
    <tr>
        <td>1 st cell<br>3rd row</td>
        <td>2nd cell<br>3rd row</td>
    </tr>
    <tr>
        <td colspan="4">Do you like tables?</td>
    </tr>
    </tbody>
</table>
</body>
</html>
